<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --cream: #fdf6ef; --rose: #c17e6a; --rose-dark: #8b4f3a; --text: #3a2e28; --muted: #8a7a72; --gold: #b8955a; }
        body { background-color: var(--cream); font-family: 'Jost', sans-serif; color: var(--text); min-height: 100vh; text-align: center; padding: 2rem; }
        .hero { padding: 3rem 2rem 2rem; background: linear-gradient(to bottom, #fdf6ef 60%, #fbeee3); margin-bottom: 2rem; }
        .error-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 8vw, 4rem); font-weight: 300; color: var(--rose-dark); margin-bottom: 1rem; }
        .error-msg { font-size: 1.1rem; color: var(--muted); line-height: 1.6; margin-bottom: 2rem; }
        .banner-wrap { width: 100%; overflow: hidden; line-height: 0; margin-bottom: 2rem; }
        .banner-wrap img { width: 100%; max-height: 300px; object-fit: cover; object-position: center; display: block; }
        a { color: var(--rose); text-decoration: none; font-weight: 500; }
        a:hover { color: var(--rose-dark); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="error-title">404 - Page Withered Away</div>
        <div class="error-msg">Looks like this page has gone the way of withered wildflowers - dried up and disappeared!</div>
    </div>
    <div class="banner-wrap">
        <img src="withered_wildflowers.webp" alt="Withered Wildflowers Banner" class="banner">
    </div>
    <p><a href="index.html">Head back to greener pastures</a></p>
</body>
</html>
